name: Apply minimal code execution runtime fix

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-minimal-code-execution-runtime-fix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Scope DOM observation to the legacy editor only
        shell: bash
        run: |
          set -euxo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'official/code-execution/main.js'
          let source = fs.readFileSync(path, 'utf8')
          const replacements = [
            [
              "    this.activeRuntime = runtime?.engine === 'rust' ? runtime : null",
              "    const isRustRuntime = runtime?.engine === 'rust'\n    const isLegacyRuntime = runtime?.engine === 'muya-js'\n    this.activeRuntime = isRustRuntime || isLegacyRuntime ? runtime : null",
              'runtime ownership'
            ],
            [
              '    if (root && this.window.MutationObserver) {',
              '    if (isLegacyRuntime && root && this.window.MutationObserver) {',
              'legacy observer scope'
            ]
          ]
          for (const [before, after, label] of replacements) {
            const count = source.split(before).length - 1
            if (count !== 1) throw new Error(`Expected one ${label} target, found ${count}`)
            source = source.replace(before, after)
          }
          fs.writeFileSync(path, source)
          NODE
          node --check official/code-execution/main.js
          grep -F "runtime?.engine === 'rust'" official/code-execution/main.js
          grep -F "runtime?.engine === 'muya-js'" official/code-execution/main.js
          grep -F "if (isLegacyRuntime && root && this.window.MutationObserver)" official/code-execution/main.js
          git diff --check

      - name: Commit only the source fix and remove this one-shot workflow
        shell: bash
        run: |
          set -euxo pipefail
          rm .github/workflows/apply-minimal-code-execution-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add official/code-execution/main.js .github/workflows/apply-minimal-code-execution-fix.yml
          git diff --cached -- official/code-execution/main.js
          git commit -m "fix(code-execution): preserve chat baseline and scope legacy fallback"
          git push origin HEAD:main
