name: Trigger addon repository bootstrap

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/trigger-bootstrap.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch bootstrap on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run bootstrap-elephant-addons.yml --repo SorbetUP/Elephant-Addons --ref main
