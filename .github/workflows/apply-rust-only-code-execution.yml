# One-shot workflow: it deletes itself after applying the source-only fix.
name: Apply Rust-only Code Execution ownership

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-rust-only-code-execution
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove the legacy editor execution path
        shell: bash
        run: |
          set -euxo pipefail
          node <<'NODE'
          const fs = require('node:fs')
          const path = 'official/code-execution/main.js'
          let source = fs.readFileSync(path, 'utf8')
          const before = `    const isRustRuntime = runtime?.engine === 'rust'
              const isLegacyRuntime = runtime?.engine === 'muya-js'
              this.activeRuntime = isRustRuntime || isLegacyRuntime ? runtime : null
              if (!this.activeRuntime) return
          
              this.scan(this.activeRuntime)
              this.disposeRuntimeWatch = this.activeRuntime.watch?.(() => this.scan(this.activeRuntime), {
                immediate: false
              }) || null
          
              const root = this.activeRuntime.root
              if (isLegacyRuntime && root && this.window.MutationObserver) {
                this.observer = new this.window.MutationObserver(() => this.scan(this.activeRuntime))
                this.observer.observe(root, { childList: true, subtree: true })
              }`
          const after = `    this.activeRuntime = runtime?.engine === 'rust' ? runtime : null
              if (!this.activeRuntime) return
          
              this.scan(this.activeRuntime)
              this.disposeRuntimeWatch = this.activeRuntime.watch?.(() => this.scan(this.activeRuntime), {
                immediate: false
              }) || null`
          const normalizedBefore = before.replace(/^ {10}/gm, '')
          const normalizedAfter = after.replace(/^ {10}/gm, '')
          const count = source.split(normalizedBefore).length - 1
          if (count !== 1) throw new Error(`Expected one legacy runtime block, found ${count}`)
          source = source.replace(normalizedBefore, normalizedAfter)
          fs.writeFileSync(path, source)
          NODE
          node --check official/code-execution/main.js
          ! grep -F "muya-js" official/code-execution/main.js
          ! grep -F "MutationObserver" official/code-execution/main.js
          grep -F "runtime?.engine === 'rust'" official/code-execution/main.js
          git diff --check

      - name: Commit only the source fix and remove this workflow
        shell: bash
        run: |
          set -euxo pipefail
          rm .github/workflows/apply-rust-only-code-execution.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add official/code-execution/main.js .github/workflows/apply-rust-only-code-execution.yml
          git diff --cached -- official/code-execution/main.js
          git commit -m 'fix(code-execution): use the Rust editor runtime exclusively'
          git push origin HEAD:main
