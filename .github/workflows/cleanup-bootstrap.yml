name: Remove bootstrap migration branch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Delete bootstrap branch and this one-shot workflow
        run: |
          set -euxo pipefail
          git push origin --delete bootstrap/migrate-official-addons || true
          git rm .github/workflows/cleanup-bootstrap.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'chore: finish addon repository bootstrap cleanup'
          git push origin HEAD:main
